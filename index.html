<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){
        try {
          var s = localStorage.getItem('amano-theme');
          if (s) {
            var j = JSON.parse(s);
            if (j.state && j.state.theme) document.documentElement.setAttribute('data-theme', j.state.theme);
          }
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>amano-front</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
